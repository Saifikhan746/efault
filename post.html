<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFAULT - POST</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="highlight.css">
    <script src="marked.min.js"></script>
    <script src="highlight.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <span class="navbar-brand">EFAULT</span>
        <button class="nav-trigger" id="navTrigger" aria-label="Open menu">&#9776;</button>
    </nav>

    <div class="rdr-menu-overlay" id="rdrMenuOverlay">
        <div class="rdr-menu-dimmer" id="rdrMenuDimmer"></div>
        <nav class="rdr-menu-panel">
            <img src="assets/arthur.jpg" class="menu-antique" alt="">
            <a href="index.html" class="rdr-menu-item">Home</a>
            <a href="blog.html"  class="rdr-menu-item active">Blog</a>
            <a href="about.html" class="rdr-menu-item">About</a>
            <button class="rdr-menu-close" id="rdrMenuClose">&#10005; &nbsp; Close</button>
        </nav>
    </div>

<div class="content">
        <div class="rdr-letter">
            <div class="post-back"><a href="blog.html">&#8592; back to blog</a></div>
            <div id="post-header" class="post-header"></div>
            <div id="post" class="post"></div>
            <div class="rdr-letter-rule rdr-letter-rule--bottom"></div>
            <div class="eof">-- EOF --</div>
            <div class="mystery-seal" style="margin-top:14px;">3301 &nbsp;·&nbsp; follow the white rabbit &nbsp;·&nbsp; 50</div>
        </div>
    </div>

    <script>
        async function initPost() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get("file");
            const postDiv = document.getElementById("post");

            if (!file) {
                postDiv.innerHTML = "<p>no post selected.</p>";
                return;
            }

            try {
                const [mdRes, idxRes] = await Promise.all([
                    fetch(`posts/${file}.md`),
                    fetch(`posts/index.json`)
                ]);
                if (!mdRes.ok) throw new Error("not found");

                const text = await mdRes.text();
                postDiv.innerHTML = marked.parse(text);

                postDiv.querySelectorAll("pre code").forEach(el => {
                    if (!el.className || el.className.trim() === "") {
                        const result = hljs.highlightAuto(el.textContent);
                        el.innerHTML = result.value;
                        el.classList.add("hljs");
                    } else {
                        hljs.highlightElement(el);
                    }
                });

                if (idxRes.ok) {
                    const index = await idxRes.json();
                    const meta = index.find(p => p.file.replace(/^posts\//, "").replace(/\.md$/, "") === file);
                    if (meta) {
                        const h1 = postDiv.querySelector("h1");
                        if (h1) h1.remove();

                        const header = document.getElementById("post-header");
                        const imgHtml = meta.image
                            ? `<div class="post-header-img-wrap"><img src="${meta.image}" class="post-header-img" alt=""><div class="post-header-img-fade"></div></div>`
                            : '';
                        header.innerHTML = `
                            ${imgHtml}
                            <h1 class="post-header-title">${meta.title}</h1>
                            <div class="post-header-date">${meta.date}</div>
                            <div class="post-header-rule"></div>
                        `;
                    }
                }
            } catch {
                postDiv.innerHTML = "<p style='color:#8b1a1a'>[ERROR] could not load post.</p>";
            }
        }

        initPost();
    </script>
    <script src="menu.js"></script>
</body>
</html>
